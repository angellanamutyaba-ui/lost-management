<!DOCTYPE html>
<html>
<head>
    <title>Matched Items</title>
</head>
<body>

<h2 link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">>Matched Items (Lost vs Found)</h2>

{% for m in matches %}
    <p>
        <b>Lost:</b> {{ m.lost.name }} |
        <b>Found:</b> {{ m.found.name }}
    </p>
{% empty %}
    <p>No matches found</p>
{% endfor %}

</body>
</html>
