{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

    <div class="card shadow p-4">

        <h2 class="text-center mb-4">
            Create Account
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>Username</label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input type="email"
                       name="email"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label>Password</label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-success w-100">

                Register

            </button>

        </form>

        <p class="text-center mt-3">

            Already have an account?

            <a href="{% url 'login' %}">
                Login
            </a>

        </p>

    </div>

</div>

{% endblock %}
